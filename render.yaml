# Render Blueprint — free backend hosting
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy:
#   1. Copy the service URL (e.g. https://paag-api.onrender.com)
#   2. Set API_INTERNAL_URL on Vercel to that URL
#   3. Set FRONTEND_URL here to your Vercel URL and redeploy

services:
  - type: web
    name: paag-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/products
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: paag-media
      - key: FRONTEND_URL
        sync: false
      - key: PAAG_CUSTOMER_SESSION_SECRET
        generateValue: true
      - key: PAAG_STUDIO_SESSION_SECRET
        generateValue: true
      - key: PAAG_STUDIO_EMAIL
        value: studio@paag.in
      - key: PAAG_STUDIO_PASSWORD
        sync: false
      - key: PAAG_PAYMENT_MODE
        value: mock
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "PAAG <orders@paag.in>"
